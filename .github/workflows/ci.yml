name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (linux/amd64)
        run: go build -o /tmp/mantis ./cmd/mantis

      - name: Run tests
        run: go test ./...

      - name: Smoke test — init + lint
        run: |
          /tmp/mantis init
          /tmp/mantis lint || true   # lint may report violations; we just check it runs
