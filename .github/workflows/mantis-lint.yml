name: Architecture Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Mantis from source
        run: CGO_ENABLED=1 go build -o /usr/local/bin/mantis ./cmd/mantis
      - name: Build graph
        run: mantis init
      - name: Architecture check
        run: mantis lint --strict --ci
