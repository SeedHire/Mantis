name: Eval

on:
  pull_request:
    branches: [main]

jobs:
  offline-eval:
    name: Offline Eval Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run offline eval
        run: go test -run TestEval -v ./internal/pipeline/... 2>&1 | tee eval-output.txt
      - name: Check eval threshold
        run: |
          if grep -q "below 95%" eval-output.txt; then
            echo "::error::Offline eval score dropped below 95% threshold"
            exit 1
          fi
