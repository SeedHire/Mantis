<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Graph nodes -->
  <circle cx="128" cy="80" r="16" fill="url(#accent)" opacity="0.9"/>
  <circle cx="72" cy="148" r="12" fill="url(#accent)" opacity="0.7"/>
  <circle cx="184" cy="148" r="12" fill="url(#accent)" opacity="0.7"/>
  <circle cx="96" cy="200" r="10" fill="url(#accent)" opacity="0.5"/>
  <circle cx="160" cy="200" r="10" fill="url(#accent)" opacity="0.5"/>
  <!-- Graph edges -->
  <line x1="128" y1="96" x2="72" y2="136" stroke="#00d4aa" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="96" x2="184" y2="136" stroke="#00d4aa" stroke-width="2.5" opacity="0.6"/>
  <line x1="72" y1="160" x2="96" y2="190" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
  <line x1="184" y1="160" x2="160" y2="190" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
  <line x1="72" y1="148" x2="184" y2="148" stroke="#00d4aa" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <!-- Mantis "M" letterform -->
  <text x="128" y="150" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.15">M</text>
</svg>
